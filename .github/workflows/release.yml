name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Need a token with push rights to commit .mcp.json back
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - name: Upgrade npm (required for OIDC Trusted Publisher)
        run: npm install -g npm@latest

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        working-directory: mcp-server
        run: npm ci

      - name: Build
        working-directory: mcp-server
        run: npm run build

      - name: Test
        working-directory: mcp-server
        run: npm test

      - name: Write .mcp.published.json with pinned npm version
        run: |
          VERSION=$(node -p "require('./mcp-server/package.json').version")
          node -e "
            const fs = require('fs');
            const cfg = {
              'claude-video-vision': {
                command: 'npx',
                args: ['claude-video-vision@' + process.argv[1]]
              }
            };
            fs.writeFileSync('.mcp.published.json', JSON.stringify(cfg, null, 2) + '\n');
          " "$VERSION"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .mcp.published.json
          git commit -m "chore: update .mcp.published.json to v$VERSION [skip ci]"
          git push origin HEAD:main

      - name: Publish to npm (via Trusted Publisher / OIDC)
        working-directory: mcp-server
        run: npm publish --provenance --access public
